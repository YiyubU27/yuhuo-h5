<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>余火 · 被拒之后，你还没凉透</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-deep: #0a0a12;
    --bg-mid: #12121f;
    --text-main: #d4cdc5;
    --text-dim: #7a7580;
    --fire-orange: #e8642c;
    --fire-warm: #f09030;
    --fire-glow: rgba(232, 100, 44, 0.15);
    --star-blue: #4a6fa5;
    --star-yellow: #c4a845;
  }

  body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
    line-height: 1.9;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-font-smoothing: antialiased;
  }

  /* 星空背景 */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* 火焰粒子 */
  #fire-canvas {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 40%;
    z-index: 1;
    pointer-events: none;
    opacity: 0.6;
  }

  /* 主内容区 */
  #scene-container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem 1.5rem;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* 文字区域 */
  .text-area {
    max-width: 380px;
    width: 100%;
    text-align: center;
    min-height: 30vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .story-line {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    margin-bottom: 0.3em;
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  .story-line.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .story-line.pause-line {
    margin: 0.8em 0;
    color: var(--text-dim);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
  }

  .story-line.highlight {
    color: var(--fire-warm);
    font-size: 1.15rem;
    font-weight: 500;
  }

  .story-line.dim {
    color: var(--text-dim);
    font-size: 0.92rem;
  }

  .story-line.quote {
    color: var(--text-dim);
    font-style: italic;
    border-left: 2px solid var(--fire-orange);
    padding-left: 1em;
    text-align: left;
    margin: 0.5em auto;
    max-width: 300px;
  }

  /* 选择按钮 */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 380px;
    margin-top: 2rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.5s ease, transform 1.5s ease;
  }

  .choices.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .choice-btn {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(232, 100, 44, 0.2);
    color: var(--text-main);
    padding: 0.9rem 1.2rem;
    border-radius: 12px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.4s ease;
    text-align: left;
    font-family: inherit;
    letter-spacing: 0.03em;
    line-height: 1.6;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--fire-glow), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .choice-btn:hover, .choice-btn:active {
    border-color: var(--fire-orange);
    background: rgba(232, 100, 44, 0.08);
    transform: translateX(4px);
  }

  .choice-btn:hover::before, .choice-btn:active::before {
    opacity: 1;
  }

  .choice-btn span {
    position: relative;
    z-index: 1;
  }

  /* 终幕按钮特殊样式 */
  .final-btn {
    text-align: center;
    font-size: 1.05rem;
    padding: 1.1rem 1.5rem;
  }

  .final-btn.fire-btn {
    border-color: var(--fire-orange);
    background: rgba(232, 100, 44, 0.12);
  }

  .final-btn.lamp-btn {
    border-color: var(--fire-warm);
    background: rgba(240, 144, 48, 0.08);
  }

  .final-btn.star-btn {
    border-color: var(--star-blue);
    background: rgba(74, 111, 165, 0.1);
  }

  /* 场景过渡遮罩 */
  #transition-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg-deep);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }

  #transition-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  /* 中央火焰动画（终幕用） */
  .fire-center {
    width: 60px;
    height: 80px;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .fire-center .flame {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 2s ease-in-out infinite alternate;
  }

  .flame.f1 {
    width: 30px; height: 50px;
    background: radial-gradient(ellipse at bottom, #f09030 0%, #e8642c 40%, rgba(232,100,44,0) 70%);
    animation-duration: 2s;
  }

  .flame.f2 {
    width: 22px; height: 40px;
    background: radial-gradient(ellipse at bottom, #ffe080 0%, #f09030 50%, rgba(240,144,48,0) 80%);
    animation-duration: 1.5s;
    animation-delay: 0.3s;
  }

  .flame.f3 {
    width: 16px; height: 30px;
    background: radial-gradient(ellipse at bottom, #fff8e0 0%, #ffe080 50%, rgba(255,224,128,0) 80%);
    animation-duration: 1.2s;
    animation-delay: 0.6s;
  }

  @keyframes flicker {
    0% { transform: translateX(-50%) scaleY(1) scaleX(1) rotate(-1deg); }
    25% { transform: translateX(-50%) scaleY(1.05) scaleX(0.95) rotate(1deg); }
    50% { transform: translateX(-50%) scaleY(0.95) scaleX(1.05) rotate(-0.5deg); }
    75% { transform: translateX(-50%) scaleY(1.08) scaleX(0.93) rotate(0.5deg); }
    100% { transform: translateX(-50%) scaleY(0.98) scaleX(1.02) rotate(-1deg); }
  }

  /* 深夜模式时间显示 */
  .time-display {
    position: fixed;
    top: 2rem;
    right: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    z-index: 20;
    letter-spacing: 0.1em;
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(232,100,44,0.2); border-radius: 1px; }

  /* 减少动画 */
  @media (prefers-reduced-motion: reduce) {
    .story-line { transition: opacity 0.3s ease; transform: none !important; }
    .choices { transition: opacity 0.3s ease; transform: none !important; }
    .flame { animation: none !important; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="fire-canvas"></canvas>
<div id="transition-overlay"></div>
<div class="time-display" id="time-display"></div>

<div id="scene-container">
  <div class="text-area" id="text-area"></div>
  <div class="choices" id="choices"></div>
</div>

<script>
// ===== 星空背景 =====
const starsCanvas = document.getElementById('stars-canvas');
const starsCtx = starsCanvas.getContext('2d');
let stars = [];

function initStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((starsCanvas.width * starsCanvas.height) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height,
      r: Math.random() * 1.2 + 0.3,
      alpha: Math.random() * 0.6 + 0.2,
      speed: Math.random() * 0.005 + 0.002,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(time) {
  starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  // 深色渐变背景
  const grad = starsCtx.createRadialGradient(
    starsCanvas.width * 0.5, starsCanvas.height * 0.4, 0,
    starsCanvas.width * 0.5, starsCanvas.height * 0.4, starsCanvas.height * 0.9
  );
  grad.addColorStop(0, '#12121f');
  grad.addColorStop(1, '#0a0a12');
  starsCtx.fillStyle = grad;
  starsCtx.fillRect(0, 0, starsCanvas.width, starsCanvas.height);

  for (const s of stars) {
    const twinkle = Math.sin(time * s.speed * 2 + s.phase) * 0.3 + 0.7;
    starsCtx.beginPath();
    starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(200, 200, 220, ${s.alpha * twinkle})`;
    starsCtx.fill();
  }
}

// ===== 火焰粒子 =====
const fireCanvas = document.getElementById('fire-canvas');
const fireCtx = fireCanvas.getContext('2d');
let fireParticles = [];

function initFire() {
  fireCanvas.width = window.innerWidth;
  fireCanvas.height = window.innerHeight * 0.4;
}

function spawnFireParticle() {
  if (fireParticles.length > 40) return;
  fireParticles.push({
    x: fireCanvas.width * 0.5 + (Math.random() - 0.5) * 30,
    y: fireCanvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: -(Math.random() * 1.5 + 0.8),
    r: Math.random() * 3 + 1.5,
    life: 1,
    decay: Math.random() * 0.015 + 0.008,
    hue: Math.random() * 30 + 15
  });
}

function drawFire() {
  fireCtx.clearRect(0, 0, fireCanvas.width, fireCanvas.height);
  for (let i = fireParticles.length - 1; i >= 0; i--) {
    const p = fireParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { fireParticles.splice(i, 1); continue; }
    fireCtx.beginPath();
    fireCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    fireCtx.fillStyle = `hsla(${p.hue}, 90%, 55%, ${p.life * 0.5})`;
    fireCtx.fill();
  }
}

// ===== 动画循环 =====
let animFrame;
function animate(time) {
  drawStars(time);
  if (Math.random() < 0.3) spawnFireParticle();
  drawFire();
  animFrame = requestAnimationFrame(animate);
}

initStars();
initFire();
animate(0);

window.addEventListener('resize', () => {
  initStars();
  initFire();
});

// ===== 时间显示 =====
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time-display').textContent = `${h}:${m}`;
}
updateTime();
setInterval(updateTime, 30000);

// ===== 场景渲染引擎 =====
const textArea = document.getElementById('text-area');
const choicesArea = document.getElementById('choices');
const overlay = document.getElementById('transition-overlay');

let isTransitioning = false;

function showScene(sceneId) {
  if (isTransitioning) return;

  // 处理终幕跳转Bot（必须在scene检查之前）
  if (sceneId.startsWith('bot-')) {
    const botUrl = 'https://www.coze.cn/s/UoNK-cgCneI/'; // 余火Bot链接
    window.location.href = botUrl;
    return;
  }

  const scene = scenes[sceneId];
  if (!scene) return;

  isTransitioning = true;
  
  // 过渡动画
  overlay.classList.add('active');
  
  setTimeout(() => {
    // 清空内容
    textArea.innerHTML = '';
    choicesArea.innerHTML = '';
    choicesArea.classList.remove('visible');
    
    // 控制火焰强度
    const isFinal = scene.isFinal;
    const fireEl = document.getElementById('fire-canvas');
    fireEl.style.opacity = isFinal ? '0.9' : '0.4';
    
    // 渲染文字
    const lines = scene.lines;
    lines.forEach((line, i) => {
      if (line.isFireCenter) {
        const fireDiv = document.createElement('div');
        fireDiv.className = 'fire-center';
        fireDiv.innerHTML = `
          <div class="flame f1"></div>
          <div class="flame f2"></div>
          <div class="flame f3"></div>
        `;
        fireDiv.style.opacity = '0';
        fireDiv.style.transform = 'translateY(10px)';
        fireDiv.style.transition = 'opacity 1.5s ease, transform 1.5s ease';
        textArea.appendChild(fireDiv);
        
        setTimeout(() => {
          fireDiv.style.opacity = '1';
          fireDiv.style.transform = 'translateY(0)';
        }, i * 600 + 800);
        return;
      }
      
      const p = document.createElement('p');
      p.className = `story-line ${line.cls}`;
      p.textContent = line.text;
      textArea.appendChild(p);
      
      // 逐行延迟显示
      const delay = i * 600 + 800;
      const isPauseLine = line.cls === 'pause-line';
      const showDelay = isPauseLine ? delay - 300 : delay;
      
      setTimeout(() => {
        p.classList.add('visible');
      }, showDelay);
    });
    
    // 计算选择按钮出现时间
    const choicesDelay = lines.length * 600 + 2000;
    
    setTimeout(() => {
      // 渲染选择按钮
      scene.choices.forEach((choice, i) => {
        const btn = document.createElement('button');
        const cls = choice.cls || 'choice-btn';
        btn.className = cls;
        btn.innerHTML = `<span>${choice.text}</span>`;
        btn.addEventListener('click', () => {
          // 点击反馈
          btn.style.borderColor = 'var(--fire-orange)';
          btn.style.background = 'rgba(232, 100, 44, 0.15)';
          setTimeout(() => showScene(choice.next), 300);
        });
        choicesArea.appendChild(btn);
      });
      
      choicesArea.classList.add('visible');
    }, choicesDelay);
    
    // 淡入
    setTimeout(() => {
      overlay.classList.remove('active');
      isTransitioning = false;
    }, 300);
    
    // 滚动到顶部
    document.getElementById('scene-container').scrollTop = 0;
    
  }, 1200);
}

// ===== 启动 =====
// 延迟1秒启动，让星空先渲染
setTimeout(() => showScene('0'), 1000);
